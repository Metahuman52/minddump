<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Device Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation Interface Area -->
    <header class="top-nav">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchBar" placeholder="Search notes or tags..." autocomplete="off">
        </div>
        <button id="togglePanelBtn" class="action-trigger-btn">+ Create Note</button>
    </header>

    <!-- Dynamic Tag Filter Navigation Bar -->
    <div id="tagBar" class="tag-bar"></div>

    <!-- Create Note Form Panel Drawer -->
    <section class="creation-panel hidden" id="creationPanel">
        <div class="input-row">
            <input type="text" id="noteTitle" placeholder="Title (e.g., Launch List)">
            <input type="text" id="noteTag" placeholder="Tag (e.g., #ACTION)">
        </div>
        <textarea id="noteContent" placeholder="Write your note contents here..."></textarea>
        <button id="addNoteBtn">Save Note</button>
    </section>

    <!-- Core Masonry Grid Dashboard Workspace Board Canvas -->
    <main class="masonry-board" id="boardGrid"></main>

    <!-- Standard, classic script loading structure -->
    <script src="script.js"></script>
</body>
</html>
